[build-system]
requires = ["setuptools >= 77.0.3"]
build-backend = "setuptools.build_meta"

[project]
name = "py3r_point_tracking_core"
version = "0.1.3"
authors = [
  { name="Marcel Schmutz", email="mschmut@ethz.ch" },
]
description = "Lightweight core library for pose estimation and pose analysis in the ETH Zurich 3R Hub"
readme = "README.md"
requires-python = ">=3.10"
classifiers = [
    "Development Status :: 3 - Alpha",
    "Programming Language :: Python :: 3",
    "Operating System :: Windows",
]
license = "MIT"
license-files = ["LICEN[CS]E*"]
dependencies = [
    "numpy",
    "opencv-python",
]

[tool.setuptools.packages.find]
where = ["src/"]
include = ["py3r.point_tracking.core*"]